<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat QR Code</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="card">

    <h1><span class="black-cat">🐱</span> Cat QR Code<span class="black-cat">🐱</span></h1>

    <div class="section">
        <h3>Sinh mã QR</h3>
        <input type="text" id="noiDung" placeholder="Nhập nội dung...">
        <button onclick="taoQR()">Tạo mã QR</button>

        <div class="qr-box">
            <div id="qrcode"></div>

        </div>
	<button id="btnTai" class="gray hidden" onclick="taiQR()">Tải QR về</button>
        <p id="thongBao"></p>

  <!-- Trái tim mèo -->
    <!-- Trái tim mèo -->
    <div id="traiTim" class="hidden">
  😽 😽 &nbsp;&nbsp;&nbsp;&nbsp;😽 😽<br>
  😽 😽 😽&nbsp😽 😽 😽<br>
  😽 😽 😽 😽 😽<br>
  😽 😽 😽 😽<br>
  😽 😽<br>
  😽
    </div>
    </div>

    <div class="section">
        <h3>Quét mã QR</h3>

        <button onclick="batCamera()">Bật camera</button>
        <button class="gray" onclick="dungCamera()">Dừng camera</button>

        <div id="reader"></div>

        <input type="file" id="chonAnh" accept="image/*">
        <button class="gray" onclick="scanAnh()">Quét từ ảnh</button>

        <p id="ketQua" style="color:#B22222; font-size:24px; font-weight:bold;"></p>
    </div>

</div>

<!-- Mèo trôi từng con -->
<div class="floating-cats">

    <!-- 40 icon -->
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>

    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>

    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>

    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
</div>

<script>

let qrcode;
let scanner;

function taoQR(){
    let input = document.getElementById("noiDung").value.trim();
    let thongBao = document.getElementById("thongBao");
    let qrDiv = document.getElementById("qrcode");

    if(input === ""){
        thongBao.innerHTML = "Vui lòng nhập nội dung.";
        thongBao.style.color = "red";
        return;
    }

    qrDiv.innerHTML = "";

    QRCode.toCanvas(input, { width: 200 }, function (err, canvas) {
        if (err) {
            console.error(err);
            return;
        }
        qrDiv.appendChild(canvas);
	document.getElementById("btnTai").classList.remove("hidden");
    });

    thongBao.innerHTML = "Tạo mã QR thành công.";
    thongBao.style.color = "green";

    document.getElementById("traiTim").classList.remove("hidden");
}
function taiQR(){
    let canvas = document.querySelector("#qrcode canvas");

    if(!canvas){
        alert("Chưa có mã QR.");
        return;
    }

    let link = document.createElement("a");
    link.download = "cat-qr.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
function batCamera(){

    if(location.protocol === "file:"){
        alert("Không thể dùng camera khi mở file trực tiếp. Hãy dùng HTTPS.");
        return;
    }

    scanner = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
    .then(devices => {

        if(!devices || devices.length === 0){
            alert("Không tìm thấy camera.");
            return;
        }

        let cameraId = devices[0].id;

        // Ưu tiên camera sau
        for(let device of devices){
            let label = device.label.toLowerCase();
            if(label.includes("back") || 
               label.includes("rear") || 
               label.includes("environment")){
                cameraId = device.id;
                break;
            }
        }

        scanner.start(
            cameraId,
            {
                fps: 10,
                qrbox: 250,
                aspectRatio: 1.0,
                videoConstraints: {
                    facingMode: { exact: "environment" }
                }
            },
            qrMessage => {
                document.getElementById("ketQua").innerHTML =
                    "Kết quả: " + qrMessage;

                // Tự động dừng sau khi quét xong
                scanner.stop();
            }
        );

    })
    .catch(err => {
        alert("Lỗi camera: " + err);
    });
}

function dungCamera(){
    if(scanner){
        scanner.stop();
    }
}

function scanAnh(){
    let fileInput = document.getElementById("chonAnh");
    let file = fileInput.files[0];

    if(!file){
        alert("Vui lòng chọn ảnh.");
        return;
    }

    const reader = new Html5Qrcode("reader");

    reader.scanFile(file, true)
        .then(qrMessage => {
            document.getElementById("ketQua").innerHTML =
                "Kết quả: " + qrMessage;
        })
        .catch(err => {
            document.getElementById("ketQua").innerHTML =
                "Không nhận diện được mã QR.";
        });
}

document.getElementById("noiDung").addEventListener("input", function(){

    document.getElementById("traiTim").classList.add("hidden");

    document.getElementById("qrcode").innerHTML = "";

    document.getElementById("btnTai").classList.add("hidden");

    document.getElementById("thongBao").innerHTML = "";

    document.getElementById("ketQua").innerHTML = "";

    document.getElementById("chonAnh").value = "";

    if(scanner){
        scanner.stop().then(() => {
            document.getElementById("reader").innerHTML = "";
        }).catch(() => {});
    }

    document.getElementById("reader").innerHTML = "";
});</script>

</body>

</html>
