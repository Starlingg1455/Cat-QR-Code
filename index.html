<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat QR Code</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js" defer></script>
<script src="https://unpkg.com/html5-qrcode" defer></script>
</head>

<body>

<div class="card">

    <h1>🐱 Cat QR Code 🐱</h1>

    <!-- ================= TẠO QR ================= -->
    <div class="section">
        <h3>Sinh mã QR</h3>

        <input type="text" id="noiDung" placeholder="Nhập nội dung...">
        <button onclick="taoQR()">Tạo mã QR</button>

        <div class="qr-box">
            <div id="qrcode"></div>
        </div>

        <button id="btnTai" class="gray hidden" onclick="taiQR()">Tải QR về</button>
        <p id="thongBao"></p>

    <!-- Trái tim mèo -->
    <div id="traiTim" class="hidden">
  😽 😽 &nbsp;&nbsp;&nbsp;&nbsp;😽 😽<br>
  😽 😽 😽&nbsp😽 😽 😽<br>
  😽 😽 😽 😽 😽<br>
  😽 😽 😽 😽<br>
  😽 😽<br>
  😽
    </div>
    </div>

 <!-- ================= QUÉT QR ================= -->
    <div class="section">
        <h3>Quét mã QR</h3>

        <button onclick="batCamera()">Bật camera</button>
        <button class="gray" onclick="dungCamera()">Dừng camera</button>

        <div id="reader"></div>

        <input type="file" id="chonAnh" accept="image/*">
        <button class="gray" onclick="scanAnh()">Quét từ ảnh</button>

        <p id="ketQua"></p>
    </div>

</div>

<script>
let scanner;
let isScanning = false;

document.addEventListener("DOMContentLoaded", () => {
    scanner = new Html5Qrcode("reader");
});

/* ================= TẠO QR ================= */
function taoQR(){
    const input = document.getElementById("noiDung").value.trim();
    const qrDiv = document.getElementById("qrcode");
    const thongBao = document.getElementById("thongBao");

    if(!input){
        thongBao.textContent = "Vui lòng nhập nội dung.";
        thongBao.style.color = "red";
        return;
    }

    qrDiv.innerHTML = "";

    QRCode.toCanvas(input, { width: 200 }, (err, canvas) => {
        if(err) return console.error(err);
        qrDiv.appendChild(canvas);
        document.getElementById("btnTai").classList.remove("hidden");
    });

    thongBao.textContent = "Tạo mã QR thành công.";
    thongBao.style.color = "green";
    document.getElementById("traiTim").classList.remove("hidden");
}

function taiQR(){
    const canvas = document.querySelector("#qrcode canvas");
    if(!canvas) return alert("Chưa có mã QR.");

    const link = document.createElement("a");
    link.download = "cat-qr.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

/* ================= CAMERA ================= */
function batCamera(){
    if(isScanning) return;

    Html5Qrcode.getCameras()
    .then(devices => {
        if(!devices.length) throw "Không tìm thấy camera.";

        return scanner.start(
            devices[0].id,
            { fps: 10, qrbox: 250 },
            qrMessage => {
                document.getElementById("ketQua").textContent =
                    "Kết quả: " + qrMessage;
            }
        );
    })
    .then(() => isScanning = true)
    .catch(err => alert("Lỗi camera: " + err));
}

function dungCamera(){
    if(!isScanning) return;

    scanner.stop()
    .then(() => {
        isScanning = false;
        document.getElementById("reader").innerHTML = "";
    })
    .catch(() => {});
}

/* ================= QUÉT ẢNH ================= */
function scanAnh(){
    const file = document.getElementById("chonAnh").files[0];
    if(!file) return alert("Vui lòng chọn ảnh.");

    scanner.scanFile(file, true)
    .then(qrMessage => {
        document.getElementById("ketQua").textContent =
            "Kết quả: " + qrMessage;
    })
    .catch(() => {
        document.getElementById("ketQua").textContent =
            "Không nhận diện được mã QR.";
    });
}

/* ================= RESET ================= */
document.getElementById("noiDung").addEventListener("input", () => {
    document.getElementById("traiTim").classList.add("hidden");
    document.getElementById("qrcode").innerHTML = "";
    document.getElementById("btnTai").classList.add("hidden");
    document.getElementById("thongBao").textContent = "";
    document.getElementById("ketQua").textContent = "";
    document.getElementById("chonAnh").value = "";
});
</script>

</body>
</html>
