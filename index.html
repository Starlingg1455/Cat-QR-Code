<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat QR Code</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="card">

    <h1><span class="black-cat">🐱</span>Cat QR Code<span class="black-cat">🐱</span></h1>

<div class="section">
<h3>Sinh mã QR</h3>
<input type="text" id="noiDung" placeholder="Nhập nội dung...">
<button onclick="taoQR()">Tạo mã QR</button>

<div class="qr-box">
<div id="qrcode"></div>
</div>

<button id="btnTai" class="gray hidden" onclick="taiQR()">Tải QR về</button>
<p id="thongBao"></p>

    <!-- Trái tim mèo -->
    <div id="traiTim" class="hidden">
  😽 😽 &nbsp;&nbsp;&nbsp;&nbsp;😽 😽<br>
  😽 😽 😽&nbsp😽 😽 😽<br>
  😽 😽 😽 😽 😽<br>
  😽 😽 😽 😽<br>
  😽 😽<br>
  😽
    </div>
    </div>

<div class="section">
<h3>Quét mã QR</h3>

<button onclick="batCamera()">Bật camera</button>
<button class="gray" onclick="dungCamera()">Dừng camera</button>

<div id="reader"></div>

<input type="file" id="chonAnh" accept="image/*" onchange="hienAnh()">
<div id="previewAnh" style="margin-top:10px; text-align:center;"></div>
<button class="gray" onclick="scanAnh()">Quét từ ảnh</button>

<p id="thongBaoDoc" style="font-weight:bold; margin-top:10px;"></p>
<p id="ketQua"></p>
</div>

</div>


<!-- Mèo trôi từng con -->
<div class="floating-cats">

    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>

    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>

    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>
    <span>🐱</span><span>🐾</span>

</div>

<script>

let scanner = null;
/* ================= TẠO QR ================= */

function taoQR(){
let input = document.getElementById("noiDung").value.trim();
let thongBao = document.getElementById("thongBao");
let qrDiv = document.getElementById("qrcode");

if(input === ""){
    thongBao.innerHTML = "Vui lòng nhập nội dung.";
    thongBao.style.color = "red";
    return;
}

qrDiv.innerHTML = "";

QRCode.toCanvas(input, { width: 200 }, function (err, canvas) {
    if (err) return;
    qrDiv.appendChild(canvas);
    document.getElementById("btnTai").classList.remove("hidden");
});

thongBao.innerHTML = "Tạo mã QR thành công.";
thongBao.style.color = "green";
}

/* ================= TẢI QR ================= */

function taiQR(){
    let canvas = document.querySelector("#qrcode canvas");
    if(!canvas){
        alert("Chưa có mã QR.");
        return;
    }

    let link = document.createElement("a");
    link.download = "cat-qr.png";
    link.href = canvas.toDataURL("image/png");
    link.click();

    let thongBao = document.getElementById("thongBao");
    thongBao.textContent = " Đã lưu mã QR thành công!";
    thongBao.style.color = "green";

}

/* ================= BẬT CAMERA ================= */

function batCamera(){

if(location.protocol !== "https:" && location.hostname !== "localhost"){
    alert("Phải dùng HTTPS để mở camera.");
    return;
}

if(!scanner){
    scanner = new Html5Qrcode("reader");
}

Html5Qrcode.getCameras()
.then(devices => {

    if(!devices.length){
        alert("Không tìm thấy camera.");
        return;
    }

    let cameraId;
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if(isMobile){
        cameraId = { facingMode: "environment" }; // cam sau
    } else {
        cameraId = devices[0].id; // webcam laptop
    }

    scanner.start(
        cameraId,
        { fps: 10, qrbox: 250 },
        qrMessage => {
            document.getElementById("thongBaoDoc").textContent =
        "Đọc mã QR thành công!";
        document.getElementById("thongBaoDoc").style.color = "green";

        document.getElementById("ketQua").textContent =
        "Kết quả: " + qrMessage;

        scanner.stop();
        }
    );

})
.catch(err => {
    alert("Lỗi camera: " + err);
});
}

/* ================= DỪNG CAMERA ================= */

function dungCamera(){
if(scanner){
    scanner.stop().catch(()=>{});
}
}

/* ================= HIỂN ẢNH ================= */

function hienAnh(){
let fileInput = document.getElementById("chonAnh");
let file = fileInput.files[0];

if(!file) return;

let reader = new FileReader();

reader.onload = function(e){
    document.getElementById("previewAnh").innerHTML =
        "<img src='" + e.target.result + "' style='max-width:100%; border-radius:10px;'>";
};

reader.readAsDataURL(file);
}

/* ================= QUÉT TỪ ẢNH ================= */

function scanAnh(){

    let fileInput = document.getElementById("chonAnh");
    let file = fileInput.files[0];

    if(!file){
        alert("Vui lòng chọn ảnh.");
        return;
    }

    if(!scanner){
        scanner = new Html5Qrcode("reader");
    }

    scanner.scanFile(file, true)
    .then(qrMessage => {

    document.getElementById("thongBaoDoc").textContent =
        " Đọc mã QR thành công!";
    document.getElementById("thongBaoDoc").style.color = "green";

    document.getElementById("ketQua").textContent =
        "Kết quả: " + qrMessage;

    document.getElementById("reader").innerHTML = "";
    document.getElementById("previewAnh").innerHTML = "";
    document.getElementById("chonAnh").value = "";
})
    .catch(() => {

       document.getElementById("thongBaoDoc").textContent =
    "❌ Không đọc được mã QR!";
    document.getElementById("thongBaoDoc").style.color = "red";
        document.getElementById("reader").innerHTML = "";
        document.getElementById("previewAnh").innerHTML = "";
    });
}
</script>
</body>
</html>
